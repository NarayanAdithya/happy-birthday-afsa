<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AfsaFlix</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --red: #e50914;
      --red-deep: #8d060d;
      --ink: #050505;
      --panel: #121212;
      --panel-soft: #1b1b1b;
      --text: #f5f5f1;
      --muted: #a7a7a7;
      --line: rgba(255, 255, 255, 0.13);
      --focus: #f2c94c;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--ink);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    button, input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .intro {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: grid;
      place-items: center;
      background: #000;
      overflow: hidden;
      transition: opacity 700ms ease, visibility 700ms ease;
    }

    .intro.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .intro-glow {
      position: absolute;
      width: min(86vw, 620px);
      aspect-ratio: 1;
      background:
        conic-gradient(from 18deg, #e50914, #f9c80e, #00a8e8, #6f2dbd, #e50914),
        radial-gradient(circle, rgba(255,255,255,0.35), transparent 64%);
      filter: blur(52px);
      opacity: 0;
      transform: scale(0.35);
      animation: colorBloom 3200ms cubic-bezier(.2,.8,.18,1) forwards;
    }

    .n-mark {
      position: relative;
      width: clamp(96px, 20vw, 210px);
      height: clamp(156px, 32vw, 340px);
      transform: scale(0.2);
      filter: drop-shadow(0 0 34px rgba(229,9,20,.8));
      animation: iconPunch 3200ms cubic-bezier(.15,.88,.22,1) forwards;
    }

    .n-mark span {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 34%;
      background: linear-gradient(180deg, #f70f1d, #97070f);
      box-shadow: inset 12px 0 18px rgba(255,255,255,.08), inset -15px 0 18px rgba(0,0,0,.32);
    }

    .n-mark .left { left: 0; }
    .n-mark .right { right: 0; }
    .n-mark .slash {
      left: 33%;
      width: 34%;
      transform: skewX(-18deg);
      transform-origin: center;
      background: linear-gradient(180deg, #ff3340, #c00010 48%, #650006);
      z-index: 2;
    }

    .intro-title {
      position: absolute;
      bottom: clamp(44px, 9vh, 86px);
      font-family: "Bebas Neue", Impact, sans-serif;
      font-size: clamp(2rem, 9vw, 5.8rem);
      letter-spacing: .06em;
      color: var(--red);
      opacity: 0;
      transform: translateY(20px);
      animation: titleIn 1200ms 1850ms ease forwards;
    }

    .skip-intro {
      position: absolute;
      right: 20px;
      top: 18px;
      padding: .55rem .8rem;
      border: 1px solid rgba(255,255,255,.24);
      border-radius: 4px;
      background: rgba(0,0,0,.36);
      color: #fff;
      font-size: .8rem;
    }

    @keyframes iconPunch {
      0% { transform: scale(.16); opacity: 0; }
      18% { opacity: 1; }
      46% { transform: scale(1); }
      68% { transform: scale(1.18); }
      100% { transform: scale(18); opacity: 0; }
    }

    @keyframes colorBloom {
      0%, 20% { opacity: 0; transform: scale(.2) rotate(0); }
      56% { opacity: .45; transform: scale(.9) rotate(90deg); }
      100% { opacity: .95; transform: scale(2.4) rotate(180deg); }
    }

    @keyframes titleIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .app {
      min-height: 100vh;
      opacity: 0;
      transition: opacity 900ms ease;
    }

    body.ready .app {
      opacity: 1;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 18px clamp(18px, 4vw, 56px);
      background: linear-gradient(180deg, rgba(0,0,0,.92), rgba(0,0,0,.62) 70%, transparent);
    }

    .brand {
      font-family: "Bebas Neue", Impact, sans-serif;
      font-size: clamp(2rem, 4vw, 3.4rem);
      letter-spacing: .07em;
      color: var(--red);
      line-height: 1;
    }

    .top-meta {
      display: flex;
      align-items: center;
      gap: .8rem;
      color: var(--muted);
      font-size: .88rem;
      white-space: nowrap;
    }

    .avatar-dot {
      width: 34px;
      height: 34px;
      border-radius: 4px;
      background: linear-gradient(135deg, #00a8e8, #f2c94c 52%, #e50914);
      border: 1px solid rgba(255,255,255,.28);
    }

    main {
      min-height: calc(100vh - 78px);
    }

    .profiles {
      min-height: calc(100vh - 78px);
      display: grid;
      align-content: center;
      padding: clamp(28px, 4vw, 56px);
    }

    .profile-shell {
      width: min(1180px, 100%);
      margin: 0 auto;
    }

    .screen-title {
      margin: 0 0 clamp(28px, 4vw, 48px);
      text-align: center;
      font-size: clamp(2rem, 6vw, 4.5rem);
      font-weight: 500;
      letter-spacing: 0;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: clamp(14px, 2.4vw, 28px);
    }

    .profile-tile {
      display: block;
      width: 100%;
      min-width: 0;
      padding: 10px 10px 14px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 8px;
      background: #151515;
      color: inherit;
      text-align: center;
      box-shadow: 0 14px 34px rgba(0,0,0,.28);
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .profile-art {
      position: relative;
      display: block;
      width: 100%;
      aspect-ratio: 1;
      border-radius: 5px;
      overflow: hidden;
      background: var(--accent);
      border: 2px solid transparent;
      transition: border-color 180ms ease;
    }

    .profile-art::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.26), transparent 38%),
        radial-gradient(circle at 70% 18%, rgba(255,255,255,.22), transparent 24%),
        linear-gradient(160deg, transparent 36%, rgba(0,0,0,.38));
    }

    .profile-art::after {
      content: attr(data-initial);
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-family: "Bebas Neue", Impact, sans-serif;
      font-size: clamp(4rem, 11vw, 8rem);
      color: rgba(255,255,255,.9);
      text-shadow: 0 8px 24px rgba(0,0,0,.32);
    }

    .profile-tile:hover .profile-art,
    .profile-tile:focus-visible .profile-art {
      border-color: #fff;
    }

    .profile-tile:hover,
    .profile-tile:focus-visible {
      transform: translateY(-5px);
      border-color: rgba(255,255,255,.45);
      background: #202020;
      outline: none;
    }

    .profile-name {
      display: block;
      width: 100%;
      min-height: 44px;
      margin-top: 10px;
      padding: 10px 6px 0;
      color: #d7d7d7;
      font-size: clamp(.95rem, 2vw, 1.25rem);
      line-height: 1.25;
      transition: color 180ms ease;
    }

    .profile-tile:hover .profile-name,
    .profile-tile:focus-visible .profile-name {
      color: #fff;
    }

    .lock {
      position: absolute;
      right: 10px;
      bottom: 10px;
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: rgba(0,0,0,.58);
      border: 1px solid rgba(255,255,255,.2);
      z-index: 1;
    }

    .lock svg {
      width: 17px;
      height: 17px;
      fill: none;
      stroke: #fff;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .experience {
      display: none;
      min-height: calc(100vh - 78px);
      padding-bottom: 56px;
    }

    .experience.is-active {
      display: block;
    }

    .profiles.is-active {
      display: grid;
    }

    .profiles:not(.is-active) {
      display: none;
    }

    .hero {
      position: relative;
      min-height: clamp(500px, 78vh, 760px);
      display: grid;
      align-items: end;
      padding: 120px clamp(20px, 5vw, 68px) 74px;
      background: var(--hero);
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, #000 0%, rgba(0,0,0,.78) 28%, rgba(0,0,0,.25) 60%, rgba(0,0,0,.75) 100%),
        linear-gradient(0deg, #050505 0%, transparent 34%);
    }

    .hero-content {
      position: relative;
      width: min(760px, 100%);
    }

    .series-label {
      display: flex;
      align-items: center;
      gap: .55rem;
      margin-bottom: .55rem;
      color: #d7d7d7;
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: .28em;
      text-transform: uppercase;
    }

    .mini-n {
      color: var(--red);
      font-family: "Bebas Neue", Impact, sans-serif;
      font-size: 1.8rem;
      letter-spacing: 0;
    }

    .hero h1 {
      margin: 0;
      font-family: "Bebas Neue", Impact, sans-serif;
      font-size: clamp(4rem, 12vw, 9.5rem);
      line-height: .82;
      letter-spacing: .03em;
      text-shadow: 0 12px 36px rgba(0,0,0,.55);
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: .7rem 1rem;
      align-items: center;
      margin: 20px 0 16px;
      color: #dedede;
      font-weight: 700;
    }

    .match {
      color: #46d369;
    }

    .rating {
      padding: .15rem .4rem;
      border: 1px solid rgba(255,255,255,.58);
      color: #eee;
    }

    .hero-copy {
      max-width: 630px;
      margin: 0 0 26px;
      color: #f0f0f0;
      font-size: clamp(1rem, 2vw, 1.24rem);
      line-height: 1.55;
      text-shadow: 0 3px 18px rgba(0,0,0,.55);
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: .8rem;
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: .55rem;
      min-height: 44px;
      padding: .72rem 1.25rem;
      border: 0;
      border-radius: 4px;
      font-weight: 800;
    }

    .action-btn.primary {
      background: #fff;
      color: #000;
    }

    .action-btn.secondary {
      background: rgba(109,109,110,.7);
      color: #fff;
    }

    .action-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .rows {
      position: relative;
      margin-top: -38px;
      padding: 0 clamp(16px, 4vw, 56px);
      z-index: 2;
    }

    .row {
      margin-bottom: 34px;
    }

    .row h2 {
      margin: 0 0 12px;
      font-size: clamp(1.2rem, 2.6vw, 1.7rem);
    }

    .photo-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(220px, 1fr));
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 10px;
      scrollbar-color: #555 transparent;
    }

    .memory-card {
      position: relative;
      min-width: 220px;
      aspect-ratio: 16 / 10;
      border-radius: 6px;
      overflow: hidden;
      background: var(--still);
      box-shadow: 0 18px 42px rgba(0,0,0,.42);
      isolation: isolate;
    }

    .memory-card img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    .memory-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 24% 20%, rgba(255,255,255,.22), transparent 20%),
        linear-gradient(180deg, transparent 34%, rgba(0,0,0,.78));
      z-index: 0;
    }

    .memory-label {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      gap: .8rem;
      align-items: end;
    }

    .memory-label strong {
      display: block;
      font-size: .98rem;
      line-height: 1.2;
    }

    .memory-label span {
      color: #d0d0d0;
      font-size: .78rem;
    }

    .episode {
      color: rgba(255,255,255,.76);
      font-size: .76rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .details-panel {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(240px, .85fr);
      gap: clamp(18px, 4vw, 48px);
      align-items: start;
      padding: 24px 0 10px;
      border-top: 1px solid var(--line);
    }

    .details-panel p {
      margin: 0;
      color: #d7d7d7;
      font-size: 1rem;
      line-height: 1.7;
    }

    .facts {
      display: grid;
      gap: .7rem;
      color: var(--muted);
      font-size: .94rem;
    }

    .facts strong {
      color: #fff;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(0,0,0,.78);
    }

    .modal.is-open {
      display: grid;
    }

    .code-card {
      width: min(440px, 100%);
      padding: 28px;
      border-radius: 8px;
      background: #171717;
      border: 1px solid var(--line);
      box-shadow: 0 24px 80px rgba(0,0,0,.65);
    }

    .code-card h2 {
      margin: 0 0 8px;
      font-size: 1.5rem;
    }

    .code-card p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }

    .code-input {
      width: 100%;
      height: 54px;
      padding: 0 14px;
      border-radius: 4px;
      border: 1px solid #555;
      background: #0b0b0b;
      color: #fff;
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: .3em;
      text-align: center;
      outline: none;
    }

    .code-input:focus {
      border-color: #fff;
      box-shadow: 0 0 0 3px rgba(255,255,255,.12);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: .75rem;
      margin-top: 18px;
    }

    .modal-actions button {
      min-height: 40px;
      padding: .55rem .95rem;
      border-radius: 4px;
      border: 0;
      font-weight: 800;
    }

    .cancel-btn {
      background: #333;
      color: #fff;
    }

    .unlock-btn {
      background: var(--red);
      color: #fff;
    }

    .error {
      min-height: 22px;
      margin-top: 10px;
      color: #ff8a8f;
      font-size: .88rem;
    }

    .shake {
      animation: shake 360ms ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      22% { transform: translateX(-8px); }
      48% { transform: translateX(8px); }
      72% { transform: translateX(-5px); }
    }

    @media (max-width: 820px) {
      .profile-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .photo-row {
        grid-template-columns: repeat(4, minmax(210px, 78vw));
      }

      .details-panel {
        grid-template-columns: 1fr;
      }

      .top-meta span {
        display: none;
      }
    }

    @media (max-width: 520px) {
      .topbar {
        padding: 14px 16px;
      }

      .profiles {
        padding: 28px 18px 42px;
      }

      .profile-grid {
        gap: 18px;
      }

      .hero {
        min-height: 640px;
        padding: 98px 18px 70px;
      }

      .hero-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .action-btn {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <section class="intro" id="intro" aria-label="AfsaFlix intro">
    <div class="intro-glow"></div>
    <div class="n-mark" aria-hidden="true">
      <span class="left"></span>
      <span class="slash"></span>
      <span class="right"></span>
    </div>
    <div class="intro-title">AFSAFLIX</div>
    <button class="skip-intro" id="skipIntro" type="button">Skip Intro</button>
  </section>

  <div class="app" id="app">
    <header class="topbar">
      <div class="brand">AFSAFLIX</div>
      <div class="top-meta">
        <span>Birthday Originals</span>
        <div class="avatar-dot" aria-hidden="true"></div>
      </div>
    </header>

    <main>
      <section class="profiles is-active" id="profiles" aria-labelledby="profiles-title">
        <div class="profile-shell">
          <h1 class="screen-title" id="profiles-title">Who's watching?</h1>
          <div class="profile-grid" id="profileGrid"></div>
        </div>
      </section>

      <section class="experience" id="experience" aria-live="polite"></section>
    </main>
  </div>

  <div class="modal" id="codeModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="code-card" id="codeCard">
      <h2 id="modalTitle">Enter Secret Code</h2>
      <p id="modalHint">Use the DDMM of the event this profile is hiding.</p>
      <input class="code-input" id="codeInput" inputmode="numeric" maxlength="4" autocomplete="off" aria-label="Four digit secret code" />
      <div class="error" id="codeError"></div>
      <div class="modal-actions">
        <button class="cancel-btn" id="cancelUnlock" type="button">Cancel</button>
        <button class="unlock-btn" id="submitUnlock" type="button">Unlock</button>
      </div>
    </div>
  </div>

  <script>

        hero: "radial-gradient(circle at 74% 20%, rgba(42,157,143,.5), transparent 24%), linear-gradient(140deg, #06241f, #1d1806 58%, #050505)",
        match: "New episodes soon",
        copy: "A locked trailer for every adventure that has not happened yet, because the best shows always leave room for another season.",
        synopsis: "Use this slot for a future event, trip, or surprise. The secret code is already in DDMM format and can be changed in one line.",
        genre: "Adventure, Future, Original",
        photos: [
          { title: "Trailer Shot", caption: "Not released yet", still: "linear-gradient(135deg, #2a9d8f, #264653)" },
          { title: "Location TBA", caption: "Plans loading", still: "linear-gradient(135deg, #e9c46a, #e76f51)" },
          { title: "New Episode", caption: "Worth waiting for", still: "linear-gradient(135deg, #00a8e8, #f2c94c)" },
          { title: "Finale?", caption: "Never", still: "linear-gradient(135deg, #e50914, #2b2d42)" }
        ]
      }
    ];

    const unlocked = new Set(JSON.parse(localStorage.getItem("afsaflix-unlocked") || "[]"));
    let selectedEvent = null;

    const intro = document.getElementById("intro");
    const profiles = document.getElementById("profiles");
    const experience = document.getElementById("experience");
    const modal = document.getElementById("codeModal");
    const codeInput = document.getElementById("codeInput");
    const codeError = document.getElementById("codeError");
    const codeCard = document.getElementById("codeCard");

    function playDunDun() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;

      const ctx = new AudioContext();
      const compressor = ctx.createDynamicsCompressor();
      const master = ctx.createGain();
      compressor.threshold.value = -22;
      compressor.knee.value = 18;
      compressor.ratio.value = 8;
      compressor.attack.value = 0.006;
      compressor.release.value = 0.45;
      master.gain.value = 0.48;
      compressor.connect(master);
      master.connect(ctx.destination);

      function tone(start, frequency, duration, gainValue, type) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        osc.type = type;
        filter.type = "lowpass";
        filter.frequency.setValueAtTime(980, ctx.currentTime + start);
        filter.frequency.exponentialRampToValueAtTime(260, ctx.currentTime + start + duration);
        filter.Q.value = 0.9;
        osc.frequency.setValueAtTime(frequency, ctx.currentTime + start);
        osc.frequency.exponentialRampToValueAtTime(frequency * 0.54, ctx.currentTime + start + duration);
        gain.gain.setValueAtTime(0.0001, ctx.currentTime + start);
        gain.gain.exponentialRampToValueAtTime(gainValue, ctx.currentTime + start + 0.018);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + duration);
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(compressor);
        osc.start(ctx.currentTime + start);
        osc.stop(ctx.currentTime + start + duration + 0.04);
      }

      function sub(start, frequency, duration, gainValue) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(frequency, ctx.currentTime + start);
        osc.frequency.exponentialRampToValueAtTime(frequency * 0.52, ctx.currentTime + start + duration);
        gain.gain.setValueAtTime(0.0001, ctx.currentTime + start);
        gain.gain.exponentialRampToValueAtTime(gainValue, ctx.currentTime + start + 0.055);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + duration);
        osc.connect(gain);
        gain.connect(compressor);
        osc.start(ctx.currentTime + start);
        osc.stop(ctx.currentTime + start + duration + 0.04);
      }

      function thump(start, duration, gainValue) {
        const sampleRate = ctx.sampleRate;
        const buffer = ctx.createBuffer(1, sampleRate * duration, sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
          const decay = 1 - i / data.length;
          data[i] = (Math.random() * 2 - 1) * decay * decay;
        }

        const source = ctx.createBufferSource();
        const filter = ctx.createBiquadFilter();
        const gain = ctx.createGain();
        source.buffer = buffer;
        filter.type = "lowpass";
        filter.frequency.setValueAtTime(150, ctx.currentTime + start);
        filter.frequency.exponentialRampToValueAtTime(54, ctx.currentTime + start + duration);
        gain.gain.setValueAtTime(gainValue, ctx.currentTime + start);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + duration);
        source.connect(filter);
        filter.connect(gain);
        gain.connect(compressor);
        source.start(ctx.currentTime + start);
      }

      thump(0.02, 0.22, 0.9);
      tone(0.03, 156, 0.46, 0.5, "sawtooth");
      tone(0.045, 78, 0.54, 0.5, "triangle");
      sub(0.03, 56, 0.82, 0.8);

      thump(0.54, 0.34, 1);
      tone(0.55, 116, 0.9, 0.72, "sawtooth");
      tone(0.565, 58, 1.2, 0.78, "triangle");
      sub(0.55, 46, 1.45, 1);

      tone(0.72, 232, 0.42, 0.16, "sine");
      tone(0.75, 348, 0.36, 0.1, "sine");
    }

    function finishIntro() {
      intro.classList.add("is-hidden");
      document.body.classList.add("ready");
    }

    function renderProfiles() {
      const grid = document.getElementById("profileGrid");
      grid.innerHTML = events.map(event => `
        <button class="profile-tile" type="button" data-id="${event.id}" aria-label="Open ${event.profile}">
          <span class="profile-art" data-initial="${event.initial}" style="--accent: ${event.accent}">
            ${unlocked.has(event.id) ? "" : lockIcon()}
          </span>
          <span class="profile-name">${event.profile}</span>
        </button>
      `).join("");
    }

    function lockIcon() {
      return `<span class="lock" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="5" y="10" width="14" height="10" rx="2"></rect><path d="M8 10V7a4 4 0 0 1 8 0v3"></path></svg></span>`;
    }

    function openUnlock(event) {
      selectedEvent = event;
      document.getElementById("modalTitle").textContent = `Unlock ${event.profile}`;
      document.getElementById("modalHint").textContent = "Secret code: DDMM of the event.";
      codeInput.value = "";
      codeError.textContent = "";
      modal.classList.add("is-open");
      setTimeout(() => codeInput.focus(), 60);
    }

    function submitUnlock() {
      if (!selectedEvent) return;
      const guess = codeInput.value.replace(/\D/g, "");
      if (guess === selectedEvent.code) {
        unlocked.add(selectedEvent.id);
        localStorage.setItem("afsaflix-unlocked", JSON.stringify([...unlocked]));
        modal.classList.remove("is-open");
        renderProfiles();
        openExperience(selectedEvent);
        return;
      }

      codeError.textContent = "That code did not unlock this profile.";
      codeCard.classList.remove("shake");
      void codeCard.offsetWidth;
      codeCard.classList.add("shake");
      codeInput.select();
    }

    function openExperience(event) {
      profiles.classList.remove("is-active");
      experience.classList.add("is-active");
      experience.innerHTML = `
        <section class="hero" style="--hero: ${event.hero}">
          <div class="hero-content">
            <div class="series-label"><span class="mini-n">N</span> Birthday Original</div>
            <h1>${event.title}</h1>
            <div class="hero-meta">
              <span class="match">${event.match}</span>
              <span>${event.year}</span>
              <span class="rating">AFZU</span>
              <span>${event.date}</span>
            </div>
            <p class="hero-copy">${event.copy}</p>
            <div class="hero-actions">
              <button class="action-btn primary" type="button" onclick="document.getElementById('memories-row').scrollIntoView({behavior:'smooth'})">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"></path></svg>
                Play Memories
              </button>
              <button class="action-btn secondary" type="button" id="backProfiles">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.5 5 8.5 12l7 7-1.8 1.8L4.9 12l8.8-8.8z"></path></svg>
                Profiles
              </button>
            </div>
          </div>
        </section>
        <div class="rows">
          <section class="row" id="memories-row">
            <h2>Because you watched ${event.profile}</h2>
            <div class="photo-row">
              ${event.photos.map((photo, index) => renderPhoto(photo, index)).join("")}
            </div>
          </section>
          <section class="details-panel">
            <p>${event.synopsis}</p>
            <div class="facts">
              <span><strong>Starring:</strong> Afzu, obviously</span>
              <span><strong>Genres:</strong> ${event.genre}</span>
              <span><strong>Unlock code:</strong> DDMM of ${event.date}</span>
            </div>
          </section>
        </div>
      `;

      document.getElementById("backProfiles").addEventListener("click", () => {
        experience.classList.remove("is-active");
        profiles.classList.add("is-active");
        window.scrollTo({ top: 0, behavior: "smooth" });
      });

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderPhoto(photo, index) {
      const image = photo.src ? `<img src="${photo.src}" alt="${photo.title}">` : "";
      return `
        <article class="memory-card" style="--still: ${photo.still}">
          ${image}
          <div class="memory-label">
            <div>
              <strong>${photo.title}</strong>
              <span>${photo.caption}</span>
            </div>
            <div class="episode">E${String(index + 1).padStart(2, "0")}</div>
          </div>
        </article>
      `;
    }

    document.getElementById("profileGrid").addEventListener("click", (event) => {
      const tile = event.target.closest(".profile-tile");
      if (!tile) return;
      const chosen = events.find(item => item.id === tile.dataset.id);
      if (!chosen) return;
      if (unlocked.has(chosen.id)) openExperience(chosen);
      else openUnlock(chosen);
    });

    document.getElementById("submitUnlock").addEventListener("click", submitUnlock);
    document.getElementById("cancelUnlock").addEventListener("click", () => modal.classList.remove("is-open"));
    document.getElementById("skipIntro").addEventListener("click", finishIntro);
    codeInput.addEventListener("input", () => {
      codeInput.value = codeInput.value.replace(/\D/g, "").slice(0, 4);
      codeError.textContent = "";
    });
    codeInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") submitUnlock();
      if (event.key === "Escape") modal.classList.remove("is-open");
    });
    modal.addEventListener("click", (event) => {
      if (event.target === modal) modal.classList.remove("is-open");
    });

    renderProfiles();
    playDunDun();
    window.addEventListener("pointerdown", () => {
      if (!document.body.classList.contains("ready")) playDunDun();
    }, { once: true });
    setTimeout(finishIntro, 3300);
  </script>
</body>
</html>
